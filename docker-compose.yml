services:
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8090}:8080"
    environment:
      PORT: "8080"
      JWT_SECRET: "${JWT_SECRET}"
      DB_PATH: "/data/openvault.db"
      VAULT_ROOT: "/data/vaults"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      ARGON2_SALT_ROUNDS: "${ARGON2_SALT_ROUNDS:-3}"
    volumes:
      - vault_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  vault_data:
