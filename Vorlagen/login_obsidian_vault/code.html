<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono&amp;family=Geist:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "surface-dim": "#0b1326",
                "tertiary-container": "#ca801e",
                "primary-container": "#a078ff",
                "surface-tint": "#d0bcff",
                "on-tertiary-fixed-variant": "#673d00",
                "primary": "#d0bcff",
                "primary-fixed-dim": "#d0bcff",
                "outline": "#958ea0",
                "on-background": "#dae2fd",
                "surface-container-high": "#222a3d",
                "on-tertiary": "#482900",
                "error": "#ffb4ab",
                "tertiary": "#ffb869",
                "secondary-container": "#3131c0",
                "primary-fixed": "#e9ddff",
                "on-primary": "#3c0091",
                "on-tertiary-fixed": "#2c1700",
                "surface-container-lowest": "#060e20",
                "surface-container": "#171f33",
                "secondary": "#c0c1ff",
                "on-error": "#690005",
                "secondary-fixed": "#e1e0ff",
                "tertiary-fixed": "#ffdcbb",
                "on-surface-variant": "#cbc3d7",
                "secondary-fixed-dim": "#c0c1ff",
                "surface-bright": "#31394d",
                "inverse-surface": "#dae2fd",
                "surface-container-highest": "#2d3449",
                "inverse-on-surface": "#283044",
                "on-primary-fixed": "#23005c",
                "on-tertiary-container": "#3f2300",
                "inverse-primary": "#6d3bd7",
                "error-container": "#93000a",
                "background": "#0b1326",
                "on-secondary-container": "#b0b2ff",
                "surface-variant": "#2d3449",
                "outline-variant": "#494454",
                "on-secondary-fixed-variant": "#2f2ebe",
                "surface": "#0b1326",
                "on-primary-fixed-variant": "#5516be",
                "tertiary-fixed-dim": "#ffb869",
                "on-error-container": "#ffdad6",
                "on-surface": "#dae2fd",
                "on-primary-container": "#340080",
                "surface-container-low": "#131b2e",
                "on-secondary": "#1000a9",
                "on-secondary-fixed": "#07006c"
            },
            "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
            },
            "spacing": {
                "lg": "24px",
                "sidebar-width": "280px",
                "xl": "40px",
                "sm": "8px",
                "max-content-width": "800px",
                "base": "4px",
                "md": "16px",
                "xs": "4px"
            },
            "fontFamily": {
                "headline-md": ["Geist"],
                "label-md": ["Geist"],
                "headline-sm": ["Geist"],
                "body-lg": ["Inter"],
                "display-lg": ["Geist"],
                "mono-code": ["JetBrains Mono"],
                "headline-md-mobile": ["Geist"],
                "body-md": ["Inter"]
            },
            "fontSize": {
                "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                "label-md": ["13px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500"}],
                "headline-sm": ["18px", {"lineHeight": "1.4", "fontWeight": "600"}],
                "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                "mono-code": ["14px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "headline-md-mobile": ["20px", {"lineHeight": "1.3", "fontWeight": "600"}],
                "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #0b1326;
            background-image: radial-gradient(circle at center, #171f33 0%, #0b1326 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-effect:focus-within {
            box-shadow: 0 0 0 2px rgba(208, 188, 255, 0.2);
        }
        .login-card {
            border: 1px solid #494454;
        }
    </style>
</head>
<body class="font-body-md text-on-surface p-md">
<!-- Login Container -->
<main class="w-full max-w-[420px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-lg">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container !text-4xl" data-icon="token">token</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-xs">OpenVault</h1>
<p class="font-body-md text-on-surface-variant">Personal Vault</p>
</div>
<!-- Login Card -->
<div class="login-card bg-surface-container-low p-xl rounded-xl shadow-2xl">
<form class="space-y-lg" id="loginForm" onsubmit="return false;">
<!-- Email Input -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">Email</label>
<div class="relative flex items-center glow-effect rounded-lg">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-highest border border-outline-variant focus:border-primary text-on-surface font-body-md py-3 pl-10 pr-4 rounded-lg outline-none transition-all placeholder:text-outline/50" id="email" placeholder="name@vault.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-base">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center glow-effect rounded-lg">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest border border-outline-variant focus:border-primary text-on-surface font-body-md py-3 pl-10 pr-12 rounded-lg outline-none transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 text-outline hover:text-primary transition-colors cursor-pointer" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-fixed-dim text-on-primary font-headline-sm text-headline-sm py-3.5 rounded-lg shadow-lg active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" id="loginBtn" type="submit">
<span>Login</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-xl pt-lg border-t border-outline-variant flex flex-col items-center gap-md">
<p class="font-body-md text-on-surface-variant">New to OpenVault?</p>
<button class="font-label-md text-label-md border border-outline-variant text-on-surface hover:bg-surface-container-highest px-6 py-2 rounded-full transition-colors">
                    Create an account
                </button>
</div>
</div>
<!-- System Status Footer -->
<footer class="mt-xl flex justify-center items-center gap-md">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-tertiary-container animate-pulse"></div>
<span class="font-label-md text-label-md text-on-surface-variant">All systems operational</span>
</div>
<div class="h-1 w-1 rounded-full bg-outline-variant"></div>
<span class="font-label-md text-label-md text-on-surface-variant">v2.4.0</span>
</footer>
</main>
<script>
        // Micro-interactions
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginForm = document.getElementById('loginForm');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const icon = togglePassword.querySelector('.material-symbols-outlined');
            icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const originalContent = loginBtn.innerHTML;
            
            // Loading State Simulation
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-80', 'cursor-not-allowed');
            loginBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-on-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Authenticating...</span>
            `;

            setTimeout(() => {
                loginBtn.innerHTML = `
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    <span>Success</span>
                `;
                loginBtn.classList.remove('bg-primary');
                loginBtn.classList.add('bg-tertiary-container');
                
                setTimeout(() => {
                    // Reset or Redirect logic here
                    loginBtn.innerHTML = originalContent;
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('opacity-80', 'cursor-not-allowed', 'bg-tertiary-container');
                    loginBtn.classList.add('bg-primary');
                }, 1000);
            }, 1500);
        });

        // Background parallax effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            document.body.style.backgroundPosition = `calc(50% + ${x}px) calc(50% + ${y}px)`;
        });
    </script>
</body></html>
